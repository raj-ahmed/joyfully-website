async function renderReports(el) {
  if (window.currentRole !== "admin") { el.innerHTML = '<div class="empty"><div class="em">🔒</div><p>Admin only</p></div>'; return; }
  el.innerHTML = setupNotice() + '<div class="stats-row" style="margin-bottom:20px;"><div class="stat-card s1"><div class="stat-emoji">📅</div><div class="stat-val" id="rTotalB">—</div><div class="stat-label">Total Bookings</div></div><div class="stat-card s2"><div class="stat-emoji">🛒</div><div class="stat-val" id="rTotalO">—</div><div class="stat-label">Total Orders</div></div><div class="stat-card s3"><div class="stat-emoji">💰</div><div class="stat-val" id="rRevenue">—</div><div class="stat-label">Order Revenue</div></div><div class="stat-card s4"><div class="stat-emoji">⭐</div><div class="stat-val" id="rAvgRating">—</div><div class="stat-label">Avg Rating</div></div><div class="stat-card s5"><div class="stat-emoji">🏷️</div><div class="stat-val" id="rDcCount">—</div><div class="stat-label">Active Promo Codes</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;"><div class="card"><div class="card-header"><h3>📅 Bookings by Service</h3></div><div class="card-body" id="bookingChart"></div></div><div class="card"><div class="card-header"><h3>🛒 Orders by Status</h3></div><div class="card-body" id="orderChart"></div></div></div><div class="card"><div class="card-header"><h3>📦 Top Selling Products</h3></div><div class="card-body" id="topProds"></div></div>';
  try {
    const [bSnap,oSnap,rvSnap,dcSnap] = await Promise.all([getDocs(collection(db,"bookings")),getDocs(collection(db,"orders")),getDocs(collection(db,"reviews")),getDocs(collection(db,"discounts"))]);
    const bookings=bSnap.docs.map(d=>d.data()), orders=oSnap.docs.map(d=>d.data()), reviews=rvSnap.docs.map(d=>d.data()).filter(r=>r.approved), discounts=dcSnap.docs.map(d=>d.data()).filter(d=>d.active);
    document.getElementById("rTotalB").textContent = bookings.length;
    document.getElementById("rTotalO").textContent = orders.length;
    const revenue = orders.filter(o=>o.status!=="cancelled").reduce((s,o)=>s+(o.total||0),0);
    document.getElementById("rRevenue").textContent = "₹"+(revenue>=1000?(revenue/1000).toFixed(1)+"K":revenue.toFixed(0));
    const avgR = reviews.length?(reviews.reduce((s,r)=>s+r.rating,0)/reviews.length).toFixed(1):"—";
    document.getElementById("rAvgRating").textContent = avgR+(avgR!=="—"?"★":"");
    document.getElementById("rDcCount").textContent = discounts.length;
    // Booking chart
    const svcMap={hostel:"🏠 Hostel",grooming:"✂️ Grooming",vet:"🩺 Vet",adoption:"❤️ Adoption",burial:"🕊️ Burial",store:"🛒 Store"};
    const bySvc={};
    bookings.forEach(b=>{ const k=b.serviceKey||"other"; bySvc[k]=(bySvc[k]||0)+1; });
    const maxB=Math.max(...Object.values(bySvc),1);
    document.getElementById("bookingChart").innerHTML = Object.keys(bySvc).length ? Object.entries(bySvc).map(function(entry) { const k=entry[0],v=entry[1]; return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;"><div style="min-width:100px;font-size:12px;font-weight:700;">' + (svcMap[k]||k) + '</div><div style="flex:1;background:var(--border);border-radius:20px;height:22px;overflow:hidden;"><div style="width:' + (v/maxB*100).toFixed(0) + '%;background:linear-gradient(90deg,var(--p),var(--pl));height:100%;border-radius:20px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;"><span style="font-size:11px;font-weight:900;color:#fff;">' + v + '</span></div></div></div>'; }).join("") : '<div class="empty"><div class="em">📭</div><p>No bookings yet</p></div>';
    // Order chart
    const byStatus={}; orders.forEach(o=>{ byStatus[o.status||"pending"]=(byStatus[o.status||"pending"]||0)+1; });
    const statusColors={pending:"#fdcb6e",confirmed:"#00b894",dispatched:"#6C5CE7",delivered:"#00cec9",cancelled:"#d63031"};
    const maxO=Math.max(...Object.values(byStatus),1);
    document.getElementById("orderChart").innerHTML = Object.keys(byStatus).length ? Object.entries(byStatus).map(function(entry) { const s=entry[0],v=entry[1]; return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;"><div style="min-width:90px;font-size:12px;font-weight:700;text-transform:capitalize;">' + s + '</div><div style="flex:1;background:var(--border);border-radius:20px;height:22px;overflow:hidden;"><div style="width:' + (v/maxO*100).toFixed(0) + '%;background:' + (statusColors[s]||"#ccc") + ';height:100%;border-radius:20px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;"><span style="font-size:11px;font-weight:900;color:#fff;">' + v + '</span></div></div></div>'; }).join("") : '<div class="empty"><div class="em">📭</div><p>No orders yet</p></div>';
    // Top products
    const prodCount={};
    orders.forEach(o=>(o.items||[]).forEach(i=>{ prodCount[i.name]=(prodCount[i.name]||0)+i.qty; }));
    const topP=Object.entries(prodCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
    document.getElementById("topProds").innerHTML = topP.length ? '<table><tr><th>Product</th><th>Units Sold</th><th>Rank</th></tr>' + topP.map(function(entry,i) { const name=entry[0],qty=entry[1]; return '<tr><td style="font-weight:700;">' + name + '</td><td><div style="display:flex;align-items:center;gap:10px;"><div style="background:var(--border);border-radius:20px;height:16px;overflow:hidden;width:150px;"><div style="width:' + (qty/topP[0][1]*100).toFixed(0) + '%;background:var(--p);height:100%;border-radius:20px;"></div></div><span style="font-size:12px;font-weight:700;">' + qty + ' units</span></div></td><td>' + ["🥇","🥈","🥉","4️⃣","5️⃣"][i] + '</td></tr>'; }).join("") + '</table>' : '<div class="empty"><div class="em">📦</div><p>No orders yet</p></div>';
  } catch(e) { console.error(e); }
}

async function renderAgencies(el) {
  if(!["admin","manager"].includes(window.currentRole)){
    el.innerHTML='<div class="empty"><div class="em">🔒</div><p>Admin access required</p></div>'; return;
  }
  el.innerHTML=`<div class="filter-tabs" id="agencyTabs" style="margin-bottom:20px;">
    <div class="ftab active" onclick="filterAg('all',this)">All</div>
    <div class="ftab" onclick="filterAg('pending',this)">⏳ Pending Approval</div>
    <div class="ftab" onclick="filterAg('approved',this)">✅ Approved</div>
    <div class="ftab" onclick="filterAg('rejected',this)">❌ Rejected</div>
  </div>
  <div class="card"><div class="card-body table-wrap" id="agencyTable"><div class="empty"><div class="em">⏳</div><p>Loading…</p></div></div></div>`;
  window._agFilter="all";
  window.filterAg=(f,btn)=>{window._agFilter=f;document.querySelectorAll("#agencyTabs .ftab").forEach(t=>t.classList.remove("active"));btn.classList.add("active");loadAgencies2();};
  loadAgencies2();
}

async function loadAgencies2(){
  const el=document.getElementById("agencyTable"); if(!el)return;
  try{
    const snap=await getDocs(collection(db,"agencies"));
    let ags=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(window._agFilter!=="all") ags=ags.filter(a=>a.status===window._agFilter);
    if(!ags.length){el.innerHTML='<div class="empty"><div class="em">🏢</div><p>No agencies found</p></div>';return;}
    const typeEmoji={hostel:"🏠",grooming:"✂️",vet:"🩺",adoption:"❤️",burial:"🕊️",breeder:"🐾",multi:"🐾"};
    el.innerHTML=`<table>
      <tr><th>Business</th><th>Type</th><th>Owner</th><th>Contact</th><th>City</th><th>Status</th><th>Actions</th></tr>
      ${ags.map(a=>`<tr>
        <td><div style="font-weight:800;">${typeEmoji[a.type]||"🐾"} ${a.name||"—"}</div><div style="font-size:11px;color:var(--muted);">${a.description?.substring(0,50)||""}</div><div style="font-size:10px;color:var(--muted);margin-top:2px;">Experience: ${a.years||"New"}</div></td>
        <td><span class="badge badge-${a.type==="hostel"?"hostel":a.type==="grooming"?"grooming":a.type==="vet"?"vet":a.type==="burial"?"burial":"adoption"}">${a.type||"—"}</span></td>
        <td style="font-weight:700;">${a.ownerName||"—"}</td>
        <td><div style="font-size:12px;">${a.phone||"—"}</div><div style="font-size:11px;color:var(--muted);">${a.email||""}</div></td>
        <td>${a.city||"—"}</td>
        <td><span class="badge badge-${a.status==="approved"?"confirmed":a.status==="rejected"?"cancelled":"pending"}">${a.status||"pending"}</span></td>
        <td><div class="action-row" style="flex-direction:column;gap:5px;">
          ${a.status!=="approved"?`<button class="btn btn-success btn-sm" onclick="updateAgStatus('${a.id}','approved')">✅ Approve</button>`:""}
          ${a.status==="approved"?`<button class="btn btn-ghost btn-sm" onclick="updateAgStatus('${a.id}','suspended')">⏸ Suspend</button>`:""}
          ${a.status!=="rejected"?`<button class="btn btn-danger btn-sm" onclick="updateAgStatus('${a.id}','rejected')">❌ Reject</button>`:""}
          <button class="btn btn-ghost btn-sm" onclick="editAgRating('${a.id}','${a.name?.replace(/'/g,"\'")||""}')">⭐ Rating</button>
        </div></td>
      </tr>`).join("")}
    </table>`;
    window.updateAgStatus=async(id,status)=>{
      await updateDoc(doc(db,"agencies",id),{status,updatedAt:serverTimestamp()});
      toast("Agency "+status+"! ✅","success"); loadAgencies2();
    };
    window.editAgRating=async(id,name)=>{
      const r=prompt("Set rating for "+name+" (1.0 to 5.0):");
      if(!r||isNaN(r))return;
      const rv=prompt("Number of reviews:");
      await updateDoc(doc(db,"agencies",id),{rating:parseFloat(r),reviews:parseInt(rv)||0});
      toast("Rating updated ⭐","success"); loadAgencies2();
    };
  }catch(e){el.innerHTML=`<div class="empty"><div class="em">⚠️</div><p>${e.message}</p></div>`;}
}
