<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy, where, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ── FIREBASE CONFIG ──────────────────────────────────────
  // IMPORTANT: Replace these values with YOUR Firebase project config
  // See SETUP GUIDE at bottom of this file
  const firebaseConfig = {
    apiKey: "AIzaSyCoh862TIz9v3JM7qCtCHLKpx84FyGFJko",
    authDomain: "joyfully-in.firebaseapp.com",
    projectId: "joyfully-in",
    storageBucket: "joyfully-in.firebasestorage.app",
    messagingSenderId: "994700639123",
    appId: "1:994700639123:web:bc5b28e78cd005efd78666"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // ── GLOBAL STATE ─────────────────────────────────────────
  window.DB = db;
  window.AUTH = auth;
  window.FIREBASE = { collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy, where, serverTimestamp, onSnapshot, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged };
  window.currentUser = null;
  window.currentRole = null;

  // ── AUTH STATE LISTENER ───────────────────────────────────
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      window.currentUser = user;
      // Check role in Firestore
      try {
        const snap = await getDocs(query(collection(db, "staff"), where("email", "==", user.email)));
        if (!snap.empty) {
          window.currentRole = snap.docs[0].data().role;
          window.staffName = snap.docs[0].data().name;
        } else {
          window.currentRole = "customer";
        }
      } catch(e) { window.currentRole = "customer"; }
      renderApp();
    } else {
      window.currentUser = null;
      window.currentRole = null;
      renderApp();
    }
  });
</script>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#f0f4ff;color:#1e1b2e;min-height:100vh;}
:root{
  --p:#6C5CE7;--pl:#a29bfe;--p2:#4834d4;
  --acc:#fd79a8;--teal:#00cec9;--gold:#fdcb6e;
  --dark:#1e1b2e;--mid:#5a5475;--muted:#9892b0;
  --bg:#f0f4ff;--card:#fff;--border:#ede9ff;
  --green:#00b894;--red:#d63031;--orange:#e17055;
  --shadow:0 4px 24px rgba(108,92,231,.10);
  --r:16px;
}
/* ── LAYOUT ── */
.app-shell{display:flex;min-height:100vh;}
.sidebar{width:240px;background:#1e1b2e;flex-shrink:0;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s;overflow-y:auto;overflow-x:hidden;}.sidebar::-webkit-scrollbar{width:4px;}.sidebar::-webkit-scrollbar-track{background:transparent;}.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px;}
.sidebar.hidden{transform:translateX(-240px);}
.main{margin-left:240px;flex:1;min-height:100vh;transition:margin .3s;}
.main.full{margin-left:0;}
/* ── SIDEBAR ── */
.sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08);}
.sidebar-logo h1{font-family:'Baloo 2',cursive;font-size:20px;font-weight:900;color:#fff;}
.sidebar-logo h1 span{color:var(--pl);}
.sidebar-logo p{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px;}
.sidebar-user{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;}
.user-avatar{width:36px;height:36px;background:linear-gradient(135deg,var(--p),var(--acc));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.user-info .uname{font-size:13px;font-weight:700;color:#fff;}
.user-info .urole{font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.5px;}
.nav-section{padding:16px 12px 8px;font-size:10px;font-weight:800;color:rgba(255,255,255,.3);letter-spacing:1px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 20px;cursor:pointer;color:rgba(255,255,255,.6);font-size:14px;font-weight:700;transition:all .2s;border-radius:10px;margin:2px 8px;}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-item.active{background:var(--p);color:#fff;}
.nav-item .ni{font-size:17px;width:22px;text-align:center;}
.sidebar-footer{padding:16px 16px 24px;border-top:1px solid rgba(255,255,255,.08);margin-top:12px;}
.sign-out-btn{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px;color:rgba(255,255,255,.5);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.sign-out-btn:hover{background:rgba(213,63,63,.2);color:#ff7675;border-color:rgba(213,63,63,.3);}
/* ── TOPBAR ── */
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(108,92,231,.06);}
.topbar-title{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;color:var(--dark);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.notif-badge{background:var(--acc);color:#fff;font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px;}
/* ── CONTENT ── */
.content{padding:28px;}
/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:#fff;border-radius:var(--r);padding:20px;border:1px solid var(--border);position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.stat-card.s1::before{background:linear-gradient(90deg,var(--p),var(--pl));}
.stat-card.s2::before{background:linear-gradient(90deg,var(--acc),#fd79a855);}
.stat-card.s3::before{background:linear-gradient(90deg,var(--teal),#00cec955);}
.stat-card.s4::before{background:linear-gradient(90deg,var(--gold),#fdcb6e55);}
.stat-card.s5::before{background:linear-gradient(90deg,var(--green),#00b89455);}
.stat-emoji{font-size:28px;margin-bottom:8px;}
.stat-val{font-family:'Baloo 2',cursive;font-size:32px;font-weight:900;color:var(--dark);}
.stat-label{font-size:12px;color:var(--muted);font-weight:700;margin-top:2px;}
/* ── CARDS ── */
.card{background:#fff;border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);}
.card-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-header h3{font-family:'Baloo 2',cursive;font-size:17px;font-weight:800;color:var(--dark);}
.card-body{padding:20px;}
/* ── TABLE ── */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{background:#f8f7ff;padding:12px 16px;text-align:left;font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border);}
td{padding:14px 16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--dark);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#faf9ff;}
/* ── BADGES ── */
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:800;}
.badge-pending{background:#fff3e0;color:#e65100;}
.badge-confirmed{background:#e8f5e9;color:#2e7d32;}
.badge-cancelled{background:#ffebee;color:#c62828;}
.badge-completed{background:#e3f2fd;color:#1565c0;}
.badge-hostel{background:rgba(108,92,231,.1);color:var(--p);}
.badge-grooming{background:rgba(253,121,168,.12);color:#e91e7a;}
.badge-vet{background:#e8f5e9;color:#2e7d32;}
.badge-adoption{background:#fff8e1;color:#f57f17;}
.badge-store{background:#e0f7fa;color:#00695c;}
.badge-burial{background:#f0f0f0;color:#555;}
.badge-admin{background:linear-gradient(135deg,var(--p),var(--acc));color:#fff;}
.badge-manager{background:#e8f5e9;color:#2e7d32;}
.badge-staff{background:#e3f2fd;color:#1565c0;}
.badge-customer{background:var(--bg);color:var(--muted);}
/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:10px;padding:9px 18px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;transition:all .2s;text-decoration:none;}
.btn-primary{background:var(--p);color:#fff;}
.btn-primary:hover{background:var(--p2);transform:translateY(-1px);}
.btn-success{background:var(--green);color:#fff;}
.btn-danger{background:var(--red);color:#fff;}
.btn-warning{background:var(--orange);color:#fff;}
.btn-ghost{background:var(--bg);color:var(--mid);border:1px solid var(--border);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn:active{transform:scale(.97);}
/* ── FORMS ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-grid.cols3{grid-template-columns:1fr 1fr 1fr;}
.form-group{margin-bottom:14px;}
.form-group.full{grid-column:1/-1;}
label{display:block;font-size:12px;font-weight:800;color:var(--dark);margin-bottom:6px;}
input,select,textarea{width:100%;border:2px solid var(--border);border-radius:10px;padding:11px 14px;font-family:'Nunito',sans-serif;font-size:13px;color:var(--dark);outline:none;transition:border-color .2s;background:#fff;}
input:focus,select:focus,textarea:focus{border-color:var(--p);}
textarea{resize:vertical;min-height:80px;}
/* ── AUTH PAGE ── */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e1b2e,#302b63);}
.auth-box{background:#fff;border-radius:24px;padding:40px;width:100%;max-width:440px;box-shadow:0 24px 80px rgba(0,0,0,.3);}
.auth-logo{text-align:center;margin-bottom:28px;}
.auth-logo h1{font-family:'Baloo 2',cursive;font-size:28px;font-weight:900;color:var(--dark);}
.auth-logo h1 span{color:var(--p);}
.auth-logo p{color:var(--muted);font-size:14px;margin-top:4px;}
.auth-tabs{display:flex;gap:0;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:24px;}
.auth-tab{flex:1;padding:10px;text-align:center;border-radius:9px;font-weight:800;font-size:13px;cursor:pointer;color:var(--muted);transition:all .2s;}
.auth-tab.active{background:#fff;color:var(--p);box-shadow:var(--shadow);}
/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.hidden{display:none;}
.modal{background:#fff;border-radius:22px;padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.modal h3{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;margin-bottom:20px;}
/* ── BOOKING FORM PAGE ── */
.booking-page{max-width:680px;margin:0 auto;}
.service-selector{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:24px;}
.svc-opt{background:#fff;border:2px solid var(--border);border-radius:14px;padding:16px 10px;text-align:center;cursor:pointer;transition:all .2s;}
.svc-opt:hover{border-color:var(--p);}
.svc-opt.selected{border-color:var(--p);background:#f0f0ff;}
.svc-opt .so-em{font-size:28px;margin-bottom:6px;}
.svc-opt .so-name{font-size:12px;font-weight:800;color:var(--dark);}
/* ── TOAST ── */
.toast{position:fixed;bottom:28px;right:28px;background:#1e1b2e;color:#fff;padding:14px 22px;border-radius:14px;font-weight:700;font-size:14px;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;box-shadow:0 8px 32px rgba(0,0,0,.3);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}
/* ── EMPTY STATE ── */
.empty{text-align:center;padding:48px 20px;color:var(--muted);}
.empty .em{font-size:48px;margin-bottom:12px;}
.empty p{font-size:15px;}
/* ── MOBILE TOGGLE ── */
.mobile-toggle{display:none;background:var(--p);border:none;border-radius:10px;padding:10px;cursor:pointer;color:#fff;font-size:18px;}
/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-240px);}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .form-grid{grid-template-columns:1fr;}
  .form-grid.cols3{grid-template-columns:1fr;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .mobile-toggle{display:flex;}
}
/* ── TAB FILTER ── */
.filter-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.ftab{padding:7px 16px;border-radius:50px;border:2px solid var(--border);background:#fff;font-weight:700;font-size:12px;cursor:pointer;color:var(--muted);transition:all .2s;}
.ftab.active{background:var(--p);color:#fff;border-color:var(--p);}
/* ── ACTION ROW ── */
.action-row{display:flex;gap:8px;align-items:center;}
/* ── SETUP NOTICE ── */
.setup-notice{background:linear-gradient(135deg,#fff3e0,#ffe0b2);border:2px solid #ff9800;border-radius:16px;padding:20px;margin-bottom:24px;}
.setup-notice h4{font-weight:800;color:#e65100;margin-bottom:6px;font-size:15px;}
.setup-notice p{font-size:13px;color:#bf360c;line-height:1.6;}
.setup-notice code{background:rgba(0,0,0,.08);padding:2px 6px;border-radius:4px;font-family:monospace;font-size:12px;}
/* ── STORE ── */
.store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;}
.store-product-card{background:#fff;border-radius:18px;overflow:hidden;border:1px solid var(--border);transition:all .3s;position:relative;}
.store-product-card:hover{transform:translateY(-4px);box-shadow:var(--shadow);}
.store-product-img{height:160px;display:flex;align-items:center;justify-content:center;font-size:64px;position:relative;}
.store-product-tag{position:absolute;top:10px;left:10px;background:var(--acc);color:#fff;font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;}
.store-product-body{padding:14px 16px 16px;}
.store-product-body h4{font-size:14px;font-weight:800;color:var(--dark);margin-bottom:4px;line-height:1.3;}
.store-product-body p{font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.5;}
.store-product-footer{display:flex;align-items:center;justify-content:space-between;}
.store-price{font-family:'Baloo 2',cursive;font-size:20px;font-weight:900;color:var(--p);}
.add-cart-btn{background:var(--p);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-weight:800;font-size:12px;cursor:pointer;transition:all .2s;font-family:'Nunito',sans-serif;}
.add-cart-btn:hover{background:var(--p2);transform:scale(1.05);}
.cart-float{position:fixed;bottom:28px;right:28px;background:var(--p);color:#fff;border:none;border-radius:50px;padding:14px 22px;font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;cursor:pointer;box-shadow:0 8px 28px rgba(108,92,231,.4);z-index:150;display:flex;align-items:center;gap:10px;transition:all .2s;}
.cart-float:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(108,92,231,.5);}
.cart-count-badge{background:#fff;color:var(--p);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;}
.cart-item-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);}
.cart-item-emoji{font-size:32px;width:52px;height:52px;background:var(--bg);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.qty-control{display:flex;align-items:center;gap:8px;}
.qty-btn{background:var(--bg);border:none;border-radius:8px;width:28px;height:28px;font-size:16px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.order-status-bar{display:flex;gap:0;margin:16px 0;}
.order-step{flex:1;text-align:center;padding:10px 4px;font-size:11px;font-weight:700;color:var(--muted);position:relative;}
.order-step.done{color:var(--green);}
.order-step.active{color:var(--p);font-weight:900;}
.order-step::after{content:'';position:absolute;top:50%;right:0;width:1px;height:60%;background:var(--border);transform:translateY(-50%);}
.order-step:last-child::after{display:none;}
/* ── IMAGE UPLOAD ── */
.img-upload-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:10px 0 16px;}
.img-slot{border:2px dashed var(--border);border-radius:14px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;background:var(--bg);}
.img-slot:hover{border-color:var(--p);background:#f0f0ff;}
.img-slot.has-img{border-style:solid;border-color:var(--p);}
.img-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.img-slot img{width:100%;height:100%;object-fit:cover;border-radius:12px;}
.img-slot .img-remove{position:absolute;top:6px;right:6px;background:rgba(214,48,49,.85);color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;z-index:2;}
.img-slot .img-label{font-size:12px;color:var(--muted);font-weight:700;margin-top:6px;}
.img-slot .img-icon{font-size:24px;margin-bottom:4px;}
/* Store product image display */
.prod-img-display{width:100%;height:100%;object-fit:cover;}
.prod-img-carousel{position:relative;height:160px;overflow:hidden;background:var(--bg);}
.prod-img-dots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:4px;}
.prod-img-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.6);}
.prod-img-dot.active{background:#fff;}
/* ── CALENDAR ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:12px;}
.cal-day-name{text-align:center;font-size:11px;font-weight:800;color:var(--muted);padding:6px 0;}
.cal-day{border-radius:10px;padding:8px 4px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;border:2px solid transparent;min-height:52px;}
.cal-day.empty{background:transparent;cursor:default;}
.cal-day.available{background:#e8f5e9;color:#2e7d32;}
.cal-day.booked{background:#ffebee;color:#c62828;cursor:default;}
.cal-day.partial{background:#fff3e0;color:#e65100;}
.cal-day.blocked{background:#f5f5f5;color:#9e9e9e;cursor:default;}
.cal-day.today{border-color:var(--p);}
.cal-day:hover:not(.empty):not(.booked):not(.blocked){transform:scale(1.05);box-shadow:var(--shadow-sm);}
.cal-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:14px;}
.cal-leg-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;}
.cal-leg-dot{width:12px;height:12px;border-radius:4px;}
/* ── REVIEWS ── */
.review-card{background:#fff;border-radius:18px;padding:20px;border:1px solid var(--border);margin-bottom:12px;}
.star-input{display:flex;gap:6px;margin:8px 0;}
.star-input span{font-size:28px;cursor:pointer;transition:transform .15s;}
.star-input span:hover{transform:scale(1.2);}
.review-stars{color:#fdcb6e;font-size:16px;letter-spacing:2px;}
/* ── DISCOUNT ── */
.discount-card{background:#fff;border-radius:16px;padding:18px;border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:12px;}
.discount-code{font-family:monospace;font-size:18px;font-weight:900;color:var(--p);background:var(--bg);padding:8px 16px;border-radius:10px;letter-spacing:2px;}
/* ── INVOICE ── */
.invoice-preview{background:#fff;border:1px solid var(--border);border-radius:16px;padding:28px;max-width:600px;margin:0 auto;}
.invoice-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid var(--border);}
.invoice-table th{background:#f8f7ff;padding:10px 12px;text-align:left;font-size:12px;font-weight:800;color:var(--muted);}
.invoice-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border);}
</style>
</head>
<body>

<div id="root"></div>
<div class="toast" id="toast"></div>

<script type="module">

// ── TOAST ─────────────────────────────────────────────────
function toast(msg, type="") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.className = "toast", 3000);
}

function attachAuthEvents() {
  window.switchAuthTab = (mode, el) => {
    document.querySelectorAll(".auth-tab").forEach(t=>t.classList.remove("active"));
    el.classList.add("active");
    document.getElementById("nameField").style.display = mode === "register" ? "block" : "none";
    document.querySelector("[onclick='handleAuth()']").textContent = mode === "register" ? "Create Account →" : "Sign In →";
    window._authMode = mode;
  };
  window._authMode = "login";
  window.handleAuth = async () => {
    const email = document.getElementById("authEmail").value.trim();
    const password = document.getElementById("authPassword").value;
    const name = document.getElementById("authName")?.value?.trim();
    if (!email || !password) return toast("Please fill all fields", "error");
    try {
      if (window._authMode === "register") {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        // Check if this email already exists in staff (pre-assigned role by admin)
        const existingSnap = await getDocs(query(collection(db, "staff"), where("email", "==", email)));
        if (existingSnap.empty) {
          // No pre-existing record — save as customer
          await addDoc(collection(db, "staff"), { email, name: name||email, role: "customer", createdAt: serverTimestamp() });
          toast("Account created! Welcome 🐾", "success");
        } else {
          // Pre-assigned role found (admin/staff/manager) — just update the name if blank
          const existingData = existingSnap.docs[0].data();
          if (!existingData.name || existingData.name === existingData.email) {
            await updateDoc(doc(db, "staff", existingSnap.docs[0].id), { name: name||email });
          }
          toast("Account created! You have been assigned role: " + existingData.role + " 🐾", "success");
        }
      } else {
        await signInWithEmailAndPassword(auth, email, password);
        toast("Welcome back! 🐾", "success");
      }
    } catch(e) {
      toast(e.message.replace("Firebase: ","").replace(/\(.*\)/,""), "error");
    }
  };
}

      <div class="ftab ${bookingFilter==='completed'?'active':''}" onclick="filterBookings('completed',this)">🏁 Completed</div>
      <div class="ftab ${bookingFilter==='cancelled'?'active':''}" onclick="filterBookings('cancelled',this)">❌ Cancelled</div>
    </div>
    <button class="btn btn-primary" onclick="goTo('new-booking')">➕ New Booking</button>
  </div>
  <div class="card">
    <div class="card-body table-wrap" id="bookingsTable"><div class="empty"><div class="em">⏳</div><p>Loading bookings…</p></div></div>
  </div>`;
  window.filterBookings = (f, el) => {
    bookingFilter = f;
    document.querySelectorAll(".ftab").forEach(t=>t.classList.remove("active"));
    el.classList.add("active");
    loadBookings();
  };
  loadBookings();
}

async function loadBookings() {
  const el = document.getElementById("bookingsTable");
  if (!el) return;
  try {
    const snap = await getDocs(query(collection(db, "bookings"), orderBy("createdAt", "desc")));
    let bookings = snap.docs.map(d=>({id:d.id,...d.data()}));
    // Customer sees only their own
    if (window.currentRole === "customer") {
      bookings = bookings.filter(b => b.customerEmail === window.currentUser.email);
    }
    if (bookingFilter !== "all") bookings = bookings.filter(b=>b.status===bookingFilter);
    if (!bookings.length) { el.innerHTML=`<div class="empty"><div class="em">📭</div><p>No bookings found</p></div>`; return; }
    const isStaff = ["admin","manager","staff"].includes(window.currentRole);
    el.innerHTML=`<table>
      <tr><th>Customer</th><th>Pet</th><th>Service</th><th>Date</th><th>Status</th><th>Notes</th>${isStaff?'<th>Actions</th>':''}</tr>
      ${bookings.map(b=>`<tr>
        <td><div style="font-weight:700;">${b.customerName||"Guest"}</div><div style="font-size:11px;color:var(--muted);">${b.customerEmail||""}</div><div style="font-size:11px;color:var(--muted);">${b.customerPhone||""}</div></td>
        <td><div style="font-weight:700;">${b.petName||"—"}</div><div style="font-size:11px;color:var(--muted);">${b.petBreed||""}</div></td>
        <td><span class="badge badge-${b.serviceKey||'hostel'}">${b.service||"—"}</span>${b.package?`<div style="font-size:11px;color:var(--muted);margin-top:3px;">${b.package}</div>`:""}</td>
        <td><div style="font-weight:700;">${b.date||"TBD"}</div><div style="font-size:11px;color:var(--muted);">${b.time||""} ${b.nights?b.nights+' nights':''}</div></td>
        <td><span class="badge badge-${b.status||'pending'}">${b.status||"pending"}</span></td>
        <td style="font-size:12px;max-width:150px;color:var(--muted);">${b.notes||"—"}</td>
        ${isStaff?`<td><div class="action-row">
          ${b.status==="pending"?`<button class="btn btn-success btn-sm" onclick="updateBookingStatus('${b.id}','confirmed')">✅ Confirm</button>`:""}
          ${b.status==="confirmed"?`<button class="btn btn-ghost btn-sm" onclick="updateBookingStatus('${b.id}','completed')">🏁 Done</button>`:""}
          ${b.status!=="cancelled"?`<button class="btn btn-danger btn-sm" onclick="updateBookingStatus('${b.id}','cancelled')">❌</button>`:""}
        </div></td>`:""}</tr>`).join("")}
    </table>`;
    window.updateBookingStatus = async (id, status) => {
      try {
        await updateDoc(doc(db, "bookings", id), { status, updatedAt: serverTimestamp() });
        toast(`Booking ${status}! ✅`, "success");
        loadBookings();
      } catch(e) { toast("Error: "+e.message, "error"); }
    };
  } catch(e) {
    el.innerHTML=`<div class="empty"><div class="em">⚠️</div><p>Could not load bookings.<br/><small>${e.message}</small></p></div>`;
  }
}

            <input id="bEmail" placeholder="email@example.com" value="${window.currentUser?.email||''}"/>
          </div>
          <div class="form-group">
            <label>Pet Name *</label>
            <input id="bPetName" placeholder="Bruno"/>
          </div>
          <div class="form-group">
            <label>Pet Breed</label>
            <input id="bPetBreed" placeholder="Labrador, Persian Cat…"/>
          </div>
          <div class="form-group" id="packageField" style="display:none;">
            <label>Package</label>
            <select id="bPackage"><option value="">Select package</option></select>
          </div>
          <div class="form-group">
            <label>Preferred Date</label>
            <input id="bDate" type="date"/>
          </div>
          <div class="form-group" id="timeField">
            <label>Preferred Time</label>
            <input id="bTime" type="time"/>
          </div>
          <div class="form-group" id="nightsField" style="display:none;">
            <label>Number of Nights</label>
            <input id="bNights" type="number" min="1" value="1" placeholder="3"/>
          </div>
          <div class="form-group full">
            <label>Special Notes / Requirements</label>
            <textarea id="bNotes" placeholder="Allergies, medications, special needs, feeding preferences…"></textarea>
          </div>
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;font-size:15px;" onclick="submitBooking()">
          Submit Booking Request 🐾
        </button>
      </div>
    </div>
  </div>`;

  window.selectService = (key, name, el) => {
    document.querySelectorAll(".svc-opt").forEach(s=>s.classList.remove("selected"));
    el.classList.add("selected");
    window._selectedService = {key, name};
    document.getElementById("bookingFormCard").style.display="block";
    document.getElementById("bookingFormTitle").textContent = `${name} — Booking Details`;
    // Show/hide fields per service
    const isHostel = key==="hostel";
    const isGrooming = key==="grooming";
    document.getElementById("nightsField").style.display = isHostel ? "block" : "none";
    document.getElementById("packageField").style.display = (isHostel||isGrooming) ? "block" : "none";
    if (isHostel) {
      document.getElementById("bPackage").innerHTML = `<option value="">Select plan</option><option>🛏️ Standard Stay – ₹499/night</option><option>🏠 Comfort Suite – ₹799/night</option><option>⭐ Luxury Villa – ₹1,299/night</option>`;
    } else if (isGrooming) {
      document.getElementById("bPackage").innerHTML = `<option value="">Select package</option><option>🛁 Basic Wash – ₹2,905</option><option>💇 Deluxe Groom – ₹5,395</option><option>🌸 Luxury Spa Day – ₹7,885</option>`;
    }
    document.getElementById("bookingFormCard").scrollIntoView({behavior:"smooth"});
  };

  window.submitBooking = async () => {
    const svc = window._selectedService;
    if (!svc) return toast("Please select a service first", "error");
    const custName = document.getElementById("bCustName").value.trim();
    const phone = document.getElementById("bPhone").value.trim();
    const petName = document.getElementById("bPetName").value.trim();
    if (!custName || !phone || !petName) return toast("Please fill Name, Phone & Pet Name", "error");
    try {
      const data = {
        service: svc.name, serviceKey: svc.key,
        customerName: custName,
        customerPhone: phone,
        customerEmail: document.getElementById("bEmail").value.trim() || window.currentUser?.email || "",
        petName, petBreed: document.getElementById("bPetBreed").value.trim(),
        package: document.getElementById("bPackage")?.value || "",
        date: document.getElementById("bDate").value,
        time: document.getElementById("bTime").value,
        nights: document.getElementById("bNights")?.value || "",
        notes: document.getElementById("bNotes").value.trim(),
        status: "pending",
        createdAt: serverTimestamp(),
        createdBy: window.currentUser?.email || "guest"
      };
      await addDoc(collection(db, "bookings"), data);
      toast("Booking submitted! We'll confirm via WhatsApp 🐾", "success");
      // Clear form
      document.getElementById("bCustName").value="";
      document.getElementById("bPhone").value="";
      document.getElementById("bPetName").value="";
      document.getElementById("bNotes").value="";
      document.getElementById("bookingFormCard").style.display="none";
      document.querySelectorAll(".svc-opt").forEach(s=>s.classList.remove("selected"));
      window._selectedService = null;
    } catch(e) { toast("Error: "+e.message, "error"); }
  };
}

// ── PRODUCTS ──────────────────────────────────────────────
async function renderProducts(el) {
  if (!["admin","manager"].includes(window.currentRole)) {
    el.innerHTML=`<div class="empty"><div class="em">🔒</div><p>Admin or Manager access required</p></div>`; return;
  }
  el.innerHTML=`${setupNotice()}
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <div class="filter-tabs">
      <div class="ftab active" onclick="filterProd('all',this)">All</div>
      <div class="ftab" onclick="filterProd('food',this)">🍖 Food</div>
      <div class="ftab" onclick="filterProd('toys',this)">🎾 Toys</div>
      <div class="ftab" onclick="filterProd('grooming',this)">🪮 Grooming</div>
    </div>
    <button class="btn btn-primary" onclick="openAddProduct()">➕ Add Product</button>
  </div>
  <div class="card"><div class="card-body table-wrap" id="productsTable"><div class="empty"><div class="em">⏳</div><p>Loading…</p></div></div></div>`;
  window.filterProd = (f,el) => { productFilter=f; document.querySelectorAll(".ftab").forEach(t=>t.classList.remove("active")); el.classList.add("active"); loadProducts(); };
  window._productImages = [null, null, null];

  window.openAddProduct = (editData=null) => {
    window._productImages = editData?.images ? [...editData.images, null, null, null].slice(0,3) : [null, null, null];
    openModal(`<h3>${editData ? "✏️ Edit Product" : "➕ Add New Product"}</h3>
      <div class="form-group"><label>Product Name *</label><input id="pName" placeholder="Premium Dog Food" value="${editData?.name||''}"/></div>
      <div class="form-grid">
        <div class="form-group"><label>Category *</label>
          <select id="pCat">
            <option value="food" ${editData?.category==='food'?'selected':''}>🍖 Food</option>
            <option value="toys" ${editData?.category==='toys'?'selected':''}>🎾 Toys</option>
            <option value="grooming" ${editData?.category==='grooming'?'selected':''}>🪮 Grooming</option>
          </select>
        </div>
        <div class="form-group"><label>Price (₹) *</label><input id="pPrice" type="number" placeholder="999" value="${editData?.price||''}"/></div>
      </div>
      <div class="form-group"><label>Description</label><textarea id="pDesc" placeholder="Describe this product…">${editData?.description||''}</textarea></div>
      <div class="form-grid">
        <div class="form-group"><label>Emoji / Icon</label><input id="pEmoji" placeholder="🐟" maxlength="4" value="${editData?.emoji||''}"/></div>
        <div class="form-group"><label>Stock Quantity</label><input id="pStock" type="number" placeholder="50" value="${editData?.stock||''}"/></div>
        <div class="form-group"><label>Discount Tag</label><input id="pTag" placeholder="Best Seller, New, Sale…" value="${editData?.tag||''}"/></div>
      </div>
      <div class="form-group">
        <label>Product Images (up to 3) — click each slot to upload</label>
        <div class="img-upload-grid" id="imgUploadGrid">
          ${[0,1,2].map(i=>`
          <div class="img-slot ${window._productImages[i]?'has-img':''}" id="imgSlot${i}">
            ${window._productImages[i]
              ? `<img src="${window._productImages[i]}" alt="Product ${i+1}"/><button class="img-remove" onclick="removeProductImg(${i},event)">✕</button>`
              : `<span class="img-icon">📷</span><span class="img-label">Photo ${i+1}</span><input type="file" accept="image/*" onchange="handleProductImg(${i},this)"/>`
            }
          </div>`).join("")}
        </div>
        <div style="font-size:11px;color:var(--muted);">JPG, PNG, WEBP — max 2MB each. First image shown as main product photo.</div>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px;">
        <button class="btn btn-primary" style="flex:2;justify-content:center;" onclick="saveProduct('${editData?.id||''}')">
          ${editData ? "💾 Update Product" : "💾 Save Product"}
        </button>
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      </div>`);

    window.handleProductImg = (idx, input) => {
      const file = input.files[0];
      if (!file) return;
      if (file.size > 2 * 1024 * 1024) { toast("Image too large — max 2MB per image", "error"); return; }
      const reader = new FileReader();
      reader.onload = (e) => {
        window._productImages[idx] = e.target.result;
        // Refresh just this slot
        const slot = document.getElementById("imgSlot" + idx);
        if (slot) {
          slot.classList.add("has-img");
          slot.innerHTML = `<img src="${e.target.result}" alt="Product ${idx+1}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;"/><button class="img-remove" onclick="removeProductImg(${idx},event)">✕</button>`;
        }
        toast("Image " + (idx+1) + " uploaded ✅", "success");
      };
      reader.readAsDataURL(file);
    };

    window.removeProductImg = (idx, e) => {
      e.stopPropagation();
      window._productImages[idx] = null;
      const slot = document.getElementById("imgSlot" + idx);
      if (slot) {
        slot.classList.remove("has-img");
        slot.innerHTML = `<span class="img-icon">📷</span><span class="img-label">Photo ${idx+1}</span><input type="file" accept="image/*" onchange="handleProductImg(${idx},this)"/>`;
      }
    };

    window.saveProduct = async (editId="") => {
      const name = document.getElementById("pName").value.trim();
      const price = document.getElementById("pPrice").value;
      if (!name || !price) return toast("Name and price required", "error");
      const images = window._productImages.filter(img => img !== null);
      const saveBtn = document.querySelector("[onclick^='saveProduct']");
      if (saveBtn) { saveBtn.textContent = "Saving…"; saveBtn.disabled = true; }
      try {
        const data = {
          name,
          category: document.getElementById("pCat").value,
          price: Number(price),
          description: document.getElementById("pDesc").value,
          emoji: document.getElementById("pEmoji").value || "📦",
          stock: Number(document.getElementById("pStock").value) || 0,
          tag: document.getElementById("pTag").value.trim(),
          images: images,
          updatedAt: serverTimestamp()
        };
        if (editId) {
          await updateDoc(doc(db, "products", editId), data);
          toast("Product updated! ✅", "success");
        } else {
          data.createdAt = serverTimestamp();
          await addDoc(collection(db, "products"), data);
          toast("Product added with " + images.length + " image(s)! 🛒", "success");
        }
        window._productImages = [null, null, null];
        closeModal(); loadProducts();
      } catch(e) { toast("Error: " + e.message, "error"); if(saveBtn){saveBtn.textContent="💾 Save Product";saveBtn.disabled=false;} }
    };
  };
  loadProducts();
}

async function loadProducts() {
  const el = document.getElementById("productsTable");
  if (!el) return;
  try {
    const snap = await getDocs(collection(db,"products"));
    let prods = snap.docs.map(d=>({id:d.id,...d.data()}));
    if (productFilter!=="all") prods=prods.filter(p=>p.category===productFilter);
    if (!prods.length){el.innerHTML=`<div class="empty"><div class="em">📦</div><p>No products yet. Add your first product!</p></div>`;return;}
    el.innerHTML=`<table>
      <tr><th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th>Actions</th></tr>
      ${prods.map(p=>`<tr>
        <td><div style="display:flex;align-items:center;gap:12px;">
          ${p.images && p.images[0]
            ? `<img src="${p.images[0]}" style="width:52px;height:52px;object-fit:cover;border-radius:10px;border:1px solid var(--border);flex-shrink:0;"/>`
            : `<div style="width:52px;height:52px;background:var(--bg);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;">${p.emoji||"📦"}</div>`}
          <div>
            <div style="font-weight:800;">${p.name}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px;">${p.description?.substring(0,45)||""}</div>
            ${p.images?.length > 1 ? `<div style="font-size:10px;color:var(--p);font-weight:700;margin-top:2px;">📷 ${p.images.length} photos</div>` : ""}
          </div>
        </div></td>
        <td><span class="badge badge-store">${p.category}</span>${p.tag?`<div style="font-size:10px;color:var(--acc);font-weight:700;margin-top:3px;">${p.tag}</div>`:""}</td>
        <td style="font-weight:800;color:var(--p);">₹${p.price?.toLocaleString()}</td>
        <td>${p.stock||0} units</td>
        <td><div class="action-row">
          <button class="btn btn-ghost btn-sm" onclick='openAddProduct(${JSON.stringify(p).replace(/'/g,"&#39;")})'>✏️ Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p.id}')">🗑️</button>
        </div></td></tr>`).join("")}
    </table>`;
    window.deleteProduct = async (id) => {
      if (!confirm("Delete this product?")) return;
      await deleteDoc(doc(db,"products",id)); toast("Deleted","success"); loadProducts();
    };
  } catch(e){el.innerHTML=`<div class="empty"><div class="em">⚠️</div><p>${e.message}</p></div>`;}
}

async function renderStaff(el) {
  if (window.currentRole !== "admin") {
    el.innerHTML=`<div class="empty"><div class="em">🔒</div><p>Admin access required</p></div>`; return;
  }
  el.innerHTML=`${setupNotice()}
  <div style="display:flex;justify-content:space-between;margin-bottom:20px;">
    <div></div>
    <button class="btn btn-primary" onclick="openAddStaff()">➕ Add Staff Member</button>
  </div>
  <div class="card"><div class="card-body table-wrap" id="staffTable"><div class="empty"><div class="em">⏳</div><p>Loading…</p></div></div></div>`;
  window.openAddStaff = () => {
    openModal(`<h3>👥 Add Staff Member</h3>
      <div style="background:#e3f2fd;border-radius:12px;padding:14px;margin-bottom:16px;font-size:13px;color:#1565c0;line-height:1.8;">
        <strong>How this works:</strong><br/>
        1️⃣ Fill in all details including a password below<br/>
        2️⃣ Click "Create Staff Account"<br/>
        3️⃣ Their login is created automatically<br/>
        4️⃣ Share the email & password with them<br/>
        5️⃣ They go to <strong>joyfully.in → Sign In</strong> directly
      </div>
      <div class="form-group"><label>Full Name *</label><input id="sName" placeholder="e.g. Priya Sharma"/></div>
      <div class="form-group"><label>Email Address *</label><input id="sEmail" type="email" placeholder="staff@email.com"/></div>
      <div class="form-group"><label>Temporary Password *</label>
        <div style="display:flex;gap:8px;">
          <input id="sPassword" type="text" placeholder="Min 6 characters" value="Joyfully@2025"/>
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('sPassword').value='Joy'+Math.random().toString(36).substring(2,8).toUpperCase()+'@1'">🔀 Auto</button>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:5px;">⚠️ Copy this password before saving — share it with the staff member</div>
      </div>
      <div class="form-group"><label>Role *</label>
        <select id="sRole">
          <option value="staff">Staff — View & update bookings</option>
          <option value="manager">Manager — Products, orders & adoptions</option>
          <option value="admin">Admin — Full access to everything</option>
        </select>
      </div>
      <div class="form-group"><label>Department</label><input id="sDept" placeholder="Grooming, Hostel, Vet, Store…"/></div>
      <div id="staffCreateResult"></div>
      <div style="display:flex;gap:10px;margin-top:8px;">
        <button class="btn btn-primary" style="flex:1;justify-content:center;" onclick="saveStaffWithAuth()">👤 Create Staff Account</button>
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      </div>`);
    window.saveStaffWithAuth = async () => {
      const name = document.getElementById("sName").value.trim();
      const email = document.getElementById("sEmail").value.trim();
      const password = document.getElementById("sPassword").value.trim();
      const role = document.getElementById("sRole").value;
      const dept = document.getElementById("sDept").value.trim();
      if(!name||!email||!password) return toast("Name, email and password are all required","error");
      if(password.length < 6) return toast("Password must be at least 6 characters","error");
      try {
        // Step 1: Check if already in staff list
        const existingSnap = await getDocs(query(collection(db,"staff"), where("email","==",email)));
        if (!existingSnap.empty) {
          // Update existing record role
          await updateDoc(doc(db,"staff",existingSnap.docs[0].id),{name,role,department:dept});
          toast("Staff record updated! Now create their Firebase Auth account manually in Firebase Console → Authentication → Add User","success");
          closeModal(); loadStaff(); return;
        }
        // Step 2: Create Firebase Auth account using Admin-style fetch
        // We use a secondary auth instance trick to avoid logging out current user
        const {initializeApp, getApps} = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
        const {getAuth: getAuth2, createUserWithEmailAndPassword: createUser2} = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
        const secondaryApp = initializeApp(window.DB.app.options, "secondary-" + Date.now());
        const secondaryAuth = getAuth2(secondaryApp);
        await createUser2(secondaryAuth, email, password);
        await secondaryAuth.signOut();
        // Step 3: Save to staff collection
        await addDoc(collection(db,"staff"),{name,email,role,department:dept,createdAt:serverTimestamp()});
        const pwd = document.getElementById("sPassword")?.value || "Joyfully@2025";
        const resultEl = document.getElementById("staffCreateResult");
        if(resultEl) {
          resultEl.innerHTML = '<div style="background:#e8f5e9;border-radius:12px;padding:14px;margin:10px 0;"><div style="font-weight:800;color:#2e7d32;font-size:14px;margin-bottom:8px;">✅ Account Created Successfully!</div><div style="font-size:13px;line-height:1.8;"><strong>📧 Email:</strong> '+email+'<br/><strong>🔑 Password:</strong> <span style="font-family:monospace;background:#fff;padding:2px 8px;border-radius:6px;border:1px solid #c8e6c9;">'+pwd+'</span><br/><strong>🔐 Role:</strong> '+role+'<br/><br/>👆 Share these credentials with your staff member.<br/>Tell them to go to <strong>joyfully.in → Sign In</strong></div></div>';
        }
        toast("Staff account created! ✅","success");
        loadStaff();
      } catch(e) {
        if(e.code === "auth/email-already-in-use") {
          // Auth account exists but no staff record — just add to Firestore
          try {
            await addDoc(collection(db,"staff"),{name,email,role,department:dept,createdAt:serverTimestamp()});

window._cart = [];
function cartCount(){ return window._cart.reduce((s,i)=>s+i.qty,0); }
function cartTotal(){ return window._cart.reduce((s,i)=>s+(i.price*i.qty),0); }

function updateCartFloat(){
  const existing = document.getElementById("cartFloatBtn");
  if(existing) existing.remove();
  if(cartCount()===0) return;
  const btn = document.createElement("button");
  btn.id = "cartFloatBtn";
  btn.className = "cart-float";
  btn.innerHTML = `🛒 <span>View Cart</span><span class="cart-count-badge">${cartCount()}</span><span style="font-size:12px;opacity:.85;">₹${cartTotal().toLocaleString()}</span>`;
  btn.onclick = openCartModal;
  document.body.appendChild(btn);
}

function openCartModal(){
  const cart = window._cart;
  if(!cart.length) return toast("Your cart is empty!","error");
  openModal(`<h3>🛒 Your Cart</h3>
    ${cart.map(item=>`
      <div class="cart-item-row">
        <div class="cart-item-emoji">${item.emoji||"📦"}</div>
        <div style="flex:1;">
          <div style="font-weight:800;font-size:14px;">${item.name}</div>
          <div style="font-size:12px;color:var(--muted);">₹${item.price.toLocaleString()} each</div>
        </div>
        <div class="qty-control">
          <button class="qty-btn" onclick="updateCartQty('${item.id}',-1)">−</button>
          <span style="font-weight:800;min-width:20px;text-align:center;">${item.qty}</span>
          <button class="qty-btn" onclick="updateCartQty('${item.id}',1)">+</button>
        </div>
        <div style="font-weight:900;color:var(--p);font-size:15px;min-width:70px;text-align:right;">₹${(item.price*item.qty).toLocaleString()}</div>
      </div>`).join("")}
    <div style="background:var(--bg);border-radius:14px;padding:16px;margin:16px 0;">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;"><span>Subtotal</span><span style="font-weight:800;">₹${cartTotal().toLocaleString()}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--green);"><span>🚚 Delivery</span><span style="font-weight:800;">${cartTotal()>=499?"FREE":"₹50"}</span></div>
      <div style="display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:16px;font-weight:900;"><span>Total</span><span style="color:var(--p);">₹${(cartTotal()+(cartTotal()<499?50:0)).toLocaleString()}</span></div>
      ${cartTotal()<499?`<div style="font-size:11px;color:var(--muted);margin-top:6px;">Add ₹${499-cartTotal()} more for FREE delivery!</div>`:""}
    </div>
    <div class="form-group"><label>Delivery Address *</label><textarea id="orderAddress" placeholder="Full address in Guwahati…" style="min-height:70px;"></textarea></div>
    <div class="form-grid">
      <div class="form-group"><label>Your Name *</label><input id="orderName" placeholder="Full name" value="${window.staffName||''}"/></div>
      <div class="form-group"><label>WhatsApp Number *</label><input id="orderPhone" placeholder="+91 98765 43210"/></div>
    </div>
    <div class="form-group"><label>Payment Method</label>
      <select id="orderPayment">
        <option value="cod">💵 Cash on Delivery</option>
        <option value="upi">📱 UPI (Pay on Delivery)</option>
        <option value="online">💳 Online Transfer</option>
      </select>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn btn-primary" style="flex:2;justify-content:center;padding:13px;" onclick="placeOrder()">Place Order 🛒</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>`);
  window.updateCartQty = (id,delta)=>{
    const item = window._cart.find(i=>i.id===id);
    if(!item) return;
    item.qty = Math.max(0,item.qty+delta);
    if(item.qty===0) window._cart = window._cart.filter(i=>i.id!==id);
    updateCartFloat();
    if(window._cart.length) openCartModal(); else closeModal();
  };
}

window.placeOrder = async ()=>{
  const address = document.getElementById("orderAddress")?.value?.trim();
  const name = document.getElementById("orderName")?.value?.trim();
  const phone = document.getElementById("orderPhone")?.value?.trim();
  if(!address||!name||!phone) return toast("Please fill name, phone & address","error");
  try{
    const delivery = cartTotal()>=499?0:50;
    await addDoc(collection(db,"orders"),{
      customerName:name, customerPhone:phone,
      customerEmail:window.currentUser?.email||"",
      items:window._cart.map(i=>({id:i.id,name:i.name,price:i.price,qty:i.qty,emoji:i.emoji||"📦"})),
      address, payment:document.getElementById("orderPayment")?.value||"cod",
      subtotal:cartTotal(), delivery, total:cartTotal()+delivery,
      status:"pending", createdAt:serverTimestamp(),
      createdBy:window.currentUser?.email||"guest"
    });
    window._cart=[]; updateCartFloat(); closeModal();
    toast("Order placed! We'll confirm via WhatsApp 🎉","success");
    setTimeout(()=>goTo("my-orders"),1500);
  }catch(e){toast("Error: "+e.message,"error");}
};

// ── PRODUCT IMAGE CAROUSEL ────────────────────────────────
window._carouselIndex = {};
window.switchProductImg = function(pid, dirOrIdx, total) {
  if (!window._productImagesCache) window._productImagesCache = {};
  const imgEl = document.getElementById("carouselImg_" + pid);
  const dotsEl = document.getElementById("dots_" + pid);
  if (!imgEl) return;
  // Get current index
  let cur = window._carouselIndex[pid] || 0;
  if (dirOrIdx === -1) { cur = (cur - 1 + total) % total; }
  else if (dirOrIdx === 1) { cur = (cur + 1) % total; }
  else { cur = dirOrIdx; }
  window._carouselIndex[pid] = cur;
  // Get images from DOM data attr or re-fetch
  const carousel = document.getElementById("carousel_" + pid);
  if (carousel && carousel.dataset.images) {
    const imgs = JSON.parse(carousel.dataset.images);
    if (imgs[cur]) imgEl.src = imgs[cur];
  }
  // Update dots
  if (dotsEl) dotsEl.querySelectorAll(".prod-img-dot").forEach((d,i) => { d.classList.toggle("active", i===cur); });
};

async function loadStoreProducts(){
  const el=document.getElementById("storeGrid");
  if(!el) return;
  try{
    const snap=await getDocs(collection(db,"products"));
    let prods=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(window._storeFilter!=="all") prods=prods.filter(p=>p.category===window._storeFilter);
    if(!prods.length){
      el.innerHTML=`<div class="empty" style="grid-column:1/-1;"><div class="em">📦</div><p>No products yet.<br/><small>Admin can add products under "Manage Products"</small></p></div>`;
      return;
    }
    el.innerHTML=prods.map(p=>`
      <div class="store-product-card">
        ${p.images && p.images.length > 0
          ? `<div class="prod-img-carousel" id="carousel_${p.id}" data-images='${JSON.stringify(p.images||[])}'>
               <img src="${p.images[0]}" class="prod-img-display" id="carouselImg_${p.id}" style="width:100%;height:160px;object-fit:cover;"/>
               ${p.tag?`<span class="store-product-tag">${p.tag}</span>`:""}
               ${p.images.length > 1 ? `
                 <div class="prod-img-dots" id="dots_${p.id}">
                   ${p.images.map((_,i)=>`<div class="prod-img-dot ${i===0?'active':''}" onclick="switchProductImg('${p.id}',${i},${p.images.length})"></div>`).join("")}
                 </div>
                 <button onclick="switchProductImg('${p.id}',-1,${p.images.length})" style="position:absolute;left:6px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.4);color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:12px;">‹</button>
                 <button onclick="switchProductImg('${p.id}',1,${p.images.length})" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.4);color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:12px;">›</button>
               ` : ""}
             </div>`
          : `<div class="store-product-img" style="background:linear-gradient(135deg,${p.category==='food'?'#e3f2fd,#bbdefb':p.category==='toys'?'#f3e5f5,#e1bee7':'#e8f5e9,#c8e6c9'});">
               ${p.tag?`<span class="store-product-tag">${p.tag}</span>`:""}
               <span>${p.emoji||"📦"}</span>
             </div>`}
        <div class="store-product-body">
          <h4>${p.name}</h4>
          <p>${p.description||""}</p>
          ${p.stock===0?`<div style="color:var(--red);font-size:12px;font-weight:700;margin-bottom:6px;">Out of Stock</div>`:`<div style="font-size:11px;color:var(--green);font-weight:700;margin-bottom:6px;">✅ ${p.stock||"In"} in stock</div>`}
          <div class="store-product-footer">
            <div class="store-price">₹${p.price?.toLocaleString()}</div>
            <button class="add-cart-btn" ${p.stock===0?"disabled style='background:var(--muted);cursor:not-allowed;'":""} onclick="addToCartItem('${p.id}','${(p.name||"").replace(/'/g,"\\'")}',${p.price},'${p.emoji||"📦"}')">
              ${p.stock===0?"Out of Stock":"+ Cart"}
            </button>
          </div>
        </div>
      </div>`).join("");
    window.addToCartItem=(id,name,price,emoji)=>{
      const existing=window._cart.find(i=>i.id===id);

      updateCartFloat();
      toast(`${emoji} Added to cart!`,"success");
    };
  }catch(e){ el.innerHTML=`<div class="empty"><div class="em">⚠️</div><p>${e.message}</p></div>`; }

async function renderHostelCalendar(el) {
  const now = new Date();
  window._calYear = now.getFullYear();
  window._calMonth = now.getMonth();
  el.innerHTML = `<div class="card" style="margin-bottom:16px;">
    <div class="card-header">
      <h3>🗓️ Hostel Availability</h3>
      <div style="display:flex;gap:10px;align-items:center;">
        <button class="btn btn-ghost btn-sm" onclick="changeCalMonth(-1)">◀ Prev</button>
        <span id="calMonthLabel" style="font-weight:800;min-width:130px;text-align:center;"></span>
        <button class="btn btn-ghost btn-sm" onclick="changeCalMonth(1)">Next ▶</button>
      </div>
    </div>
    <div class="card-body">
      <div class="cal-grid" id="calDayNames"></div>
      <div class="cal-grid" id="calGrid" style="margin-top:4px;"></div>
      <div class="cal-legend">
        <div class="cal-leg-item"><div class="cal-leg-dot" style="background:#e8f5e9;border:1px solid #a5d6a7;"></div>Available</div>
        <div class="cal-leg-item"><div class="cal-leg-dot" style="background:#ffebee;border:1px solid #ef9a9a;"></div>Booked</div>
        <div class="cal-leg-item"><div class="cal-leg-dot" style="background:#f5f5f5;border:1px solid #e0e0e0;"></div>Blocked</div>
      </div>
    </div>
  </div>
  <div class="card"><div class="card-header"><h3>⚙️ Block Dates</h3></div>
    <div class="card-body">
      <p style="font-size:13px;color:var(--muted);margin-bottom:14px;">Block dates when hostel is closed or full.</p>
      <div class="form-grid">
        <div class="form-group"><label>Block From</label><input type="date" id="blockFrom"/></div>
        <div class="form-group"><label>Block To</label><input type="date" id="blockTo"/></div>
        <div class="form-group"><label>Reason</label><input id="blockReason" placeholder="Holiday, Maintenance…"/></div>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-danger" onclick="blockCalDates()">🔒 Block Dates</button>
        <button class="btn btn-ghost" onclick="loadCalendar()">↻ Refresh</button>
      </div>
      <div id="blockedList" style="margin-top:16px;"></div>
    </div>
  </div>`;

  window.changeCalMonth = function(delta) {
    window._calMonth += delta;
    if (window._calMonth > 11) { window._calMonth = 0; window._calYear++; }
    if (window._calMonth < 0) { window._calMonth = 11; window._calYear--; }
    loadCalendar();
  };
  window.blockCalDates = async function() {
    const from = document.getElementById("blockFrom").value;
    const to = document.getElementById("blockTo").value || from;
    const reason = document.getElementById("blockReason").value || "Blocked";
    if (!from) return toast("Please select a date", "error");
    try {
      await addDoc(collection(db, "hostel_blocks"), { from, to, reason, createdAt: serverTimestamp() });
      toast("Dates blocked! 🔒", "success"); loadCalendar();
    } catch(e) { toast("Error: " + e.message, "error"); }
  };
  loadCalendar();
}

async function loadCalendar() {
  const yr = window._calYear, mo = window._calMonth;
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const lbl = document.getElementById("calMonthLabel");
  if (lbl) lbl.textContent = months[mo] + " " + yr;
  const dayNamesEl = document.getElementById("calDayNames");
  if (dayNamesEl) dayNamesEl.innerHTML = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d => '<div class="cal-day-name">' + d + '</div>').join("");
  let bookedDates = new Set(), blockedDates = new Set();
  try {
    const bSnap = await getDocs(collection(db, "bookings"));
    bSnap.docs.forEach(d => {
      const data = d.data();
      if (data.serviceKey === "hostel" && data.date && data.status !== "cancelled") {
        const checkIn = new Date(data.date); const nights = parseInt(data.nights) || 1;
        for (let i = 0; i < nights; i++) { const dt = new Date(checkIn); dt.setDate(dt.getDate() + i); if (dt.getFullYear() === yr && dt.getMonth() === mo) bookedDates.add(dt.getDate()); }
      }
    });
    const blSnap = await getDocs(collection(db, "hostel_blocks"));
    blSnap.docs.forEach(d => {
      const bd = d.data(); if (!bd.from) return;
      const start = new Date(bd.from), end = new Date(bd.to || bd.from), cur = new Date(start);
      while (cur <= end) { if (cur.getFullYear() === yr && cur.getMonth() === mo) blockedDates.add(cur.getDate()); cur.setDate(cur.getDate() + 1); }
    });
    // show blocked list
    const bl2 = await getDocs(collection(db, "hostel_blocks"));
    const blist = document.getElementById("blockedList");
    if (blist) {
      const blocks = bl2.docs.map(d => ({ id: d.id, ...d.data() }));
      blist.innerHTML = blocks.length ? '<div style="font-weight:800;font-size:13px;margin-bottom:8px;">Blocked Periods:</div>' + blocks.map(b => '<div style="display:flex;justify-content:space-between;align-items:center;background:var(--bg);border-radius:10px;padding:8px 12px;margin-bottom:6px;font-size:12px;"><span>🔒 ' + b.from + (b.to && b.to !== b.from ? ' → ' + b.to : '') + ' — ' + b.reason + '</span><button class="btn btn-danger btn-sm" onclick="unblockDate(\'' + b.id + '\')">Remove</button></div>').join("") : "";
    }
  } catch(e) {}
  const firstDay = new Date(yr, mo, 1).getDay(), daysInMonth = new Date(yr, mo + 1, 0).getDate();
  const today = new Date();
  let html = Array(firstDay).fill('<div class="cal-day empty"></div>').join("");
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = (d === today.getDate() && mo === today.getMonth() && yr === today.getFullYear());
    const cls = blockedDates.has(d) ? "blocked" : bookedDates.has(d) ? "booked" : "available";
    const icon = blockedDates.has(d) ? "🔒" : bookedDates.has(d) ? "🐾" : "✅";
    html += '<div class="cal-day ' + cls + (isToday ? " today" : "") + '">' + d + '<br/><span style="font-size:11px;">' + icon + '</span></div>';
  }
  const gridEl = document.getElementById("calGrid");
  if (gridEl) gridEl.innerHTML = html;
  window.unblockDate = async function(id) { await deleteDoc(doc(db, "hostel_blocks", id)); toast("Unblocked", "success"); loadCalendar(); };
}

  window._rvRating = 0;

async function loadRvReviews() {
  try {
    const snap = await getDocs(query(collection(db, "reviews"), orderBy("createdAt", "desc")));
    const reviews = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const approved = reviews.filter(r => r.approved);
    const avgRating = approved.length ? (approved.reduce((s, r) => s + r.rating, 0) / approved.length).toFixed(1) : "—";
    const statsEl = document.getElementById("ratingStats");
    if (statsEl) {
      const stars = avgRating !== "—" ? "★".repeat(Math.round(parseFloat(avgRating))) + "☆".repeat(5 - Math.round(parseFloat(avgRating))) : "☆☆☆☆☆";
      statsEl.innerHTML = '<div style="text-align:center;padding:16px 0;"><div style="font-family:\'Baloo 2\',cursive;font-size:52px;font-weight:900;color:var(--p);">' + avgRating + '</div><div style="font-size:22px;color:#fdcb6e;margin:6px 0;">' + stars + '</div><div style="font-size:13px;color:var(--muted);">' + approved.length + ' verified reviews</div></div>' +
        [5,4,3,2,1].map(function(n) { const c = approved.filter(r => r.rating === n).length, pct = approved.length ? (c/approved.length*100).toFixed(0) : 0; return '<div style="display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:5px;"><span style="color:#fdcb6e;font-weight:700;min-width:18px;">' + n + '★</span><div style="flex:1;background:var(--border);border-radius:20px;height:8px;overflow:hidden;"><div style="width:' + pct + '%;background:#fdcb6e;height:100%;border-radius:20px;"></div></div><span style="color:var(--muted);min-width:24px;">' + c + '</span></div>'; }).join("");
    }
    const listEl = document.getElementById("reviewsList");
    const isAdmin = ["admin","manager"].includes(window.currentRole);
    const toShow = isAdmin ? reviews : approved;
    if (!toShow.length) { listEl.innerHTML = '<div class="empty"><div class="em">⭐</div><p>No reviews yet</p></div>'; return; }
    listEl.innerHTML = toShow.map(function(r) {
      const rStars = "★".repeat(r.rating||0) + "☆".repeat(5-(r.rating||0));
      return '<div class="review-card" style="' + (!r.approved ? 'opacity:.65;border-style:dashed;' : '') + '"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;"><div><div style="font-weight:800;font-size:14px;">' + r.name + '</div><div style="font-size:11px;color:var(--muted);">' + r.service + '</div></div><div style="display:flex;align-items:center;gap:8px;"><div style="color:#fdcb6e;font-size:16px;">' + rStars + '</div>' + (!r.approved ? '<span class="badge badge-pending">Pending</span>' : '<span class="badge badge-confirmed">Approved</span>') + '</div></div><p style="font-size:14px;color:var(--mid);line-height:1.6;">"' + r.text + '"</p>' + (isAdmin ? '<div style="display:flex;gap:8px;margin-top:10px;">' + (!r.approved ? '<button class="btn btn-success btn-sm" onclick="approveRv(\'' + r.id + '\')">✅ Approve</button>' : '') + '<button class="btn btn-danger btn-sm" onclick="deleteRv(\'' + r.id + '\')">❌ Remove</button></div>' : '') + '</div>';
    }).join("");
    window.approveRv = async function(id) { await updateDoc(doc(db,"reviews",id),{approved:true}); toast("Approved ✅","success"); loadRvReviews(); };
    window.deleteRv = async function(id) { if(!confirm("Remove?"))return; await deleteDoc(doc(db,"reviews",id)); toast("Removed","success"); loadRvReviews(); };
  } catch(e) { const el2 = document.getElementById("reviewsList"); if(el2) el2.innerHTML = '<div class="empty"><div class="em">⚠️</div><p>' + e.message + '</p></div>'; }
}

async function renderDiscounts(el) {
  if (!["admin","manager"].includes(window.currentRole)) { el.innerHTML = '<div class="empty"><div class="em">🔒</div><p>Admin access required</p></div>'; return; }
  el.innerHTML = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;"><div class="card"><div class="card-header"><h3>➕ Create Discount Code</h3></div><div class="card-body"><div class="form-group"><label>Code *</label><div style="display:flex;gap:8px;"><input id="dcCode" placeholder="e.g. WELCOME20" style="text-transform:uppercase;"/><button class="btn btn-ghost btn-sm" onclick="genDcCode()">Auto</button></div></div><div class="form-grid"><div class="form-group"><label>Type</label><select id="dcType"><option value="percent">% Percentage</option><option value="flat">₹ Flat</option></select></div><div class="form-group"><label>Value *</label><input id="dcValue" type="number" placeholder="20"/></div><div class="form-group"><label>Min Order (₹)</label><input id="dcMin" type="number" placeholder="500"/></div><div class="form-group"><label>Max Uses</label><input id="dcMax" type="number" placeholder="100"/></div><div class="form-group"><label>Valid From</label><input id="dcFrom" type="date"/></div><div class="form-group"><label>Valid Until</label><input id="dcTo" type="date"/></div></div><button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;" onclick="saveDcCode()">Create Code 🏷️</button></div></div><div class="card"><div class="card-header"><h3>🔍 Test a Code</h3></div><div class="card-body"><div class="form-group"><label>Enter Code</label><div style="display:flex;gap:8px;"><input id="testDcCode" placeholder="PROMO20" style="text-transform:uppercase;"/><button class="btn btn-primary btn-sm" onclick="testDcCode()">Test</button></div></div><div class="form-group" style="margin-top:10px;"><label>Order Amount (₹)</label><input id="testDcAmt" type="number" value="1000"/></div><div id="dcTestResult" style="margin-top:10px;"></div></div></div></div><div class="card"><div class="card-header"><h3>🏷️ All Discount Codes</h3></div><div class="card-body table-wrap" id="discountsList"><div class="empty"><div class="em">⏳</div><p>Loading…</p></div></div></div>';
  window.genDcCode = function() { document.getElementById("dcCode").value = "JOY" + Math.random().toString(36).substring(2,6).toUpperCase(); };
  window.saveDcCode = async function() {
    const code = document.getElementById("dcCode").value.trim().toUpperCase();
    const value = parseFloat(document.getElementById("dcValue").value);
    if (!code || !value) return toast("Code and value required", "error");
    try {
      await addDoc(collection(db,"discounts"),{ code, type:document.getElementById("dcType").value, value, minOrder:parseFloat(document.getElementById("dcMin").value)||0, maxUses:parseInt(document.getElementById("dcMax").value)||999, usedCount:0, validFrom:document.getElementById("dcFrom").value||"", validTo:document.getElementById("dcTo").value||"", active:true, createdAt:serverTimestamp() });
      toast("Code " + code + " created! 🏷️", "success"); loadDcCodes();
    } catch(e) { toast("Error: " + e.message, "error"); }
  };
  window.testDcCode = async function() {
    const code = document.getElementById("testDcCode").value.trim().toUpperCase();
    const amount = parseFloat(document.getElementById("testDcAmt").value || 1000);
    const res = document.getElementById("dcTestResult");
    if (!code) { res.innerHTML = '<div style="color:var(--red);font-size:13px;font-weight:700;">Please enter a code</div>'; return; }
    try {
      const snap = await getDocs(query(collection(db,"discounts"), where("code","==",code)));
      if (snap.empty) { res.innerHTML = '<div style="background:#ffebee;border-radius:10px;padding:12px;color:#c62828;font-weight:700;">❌ Invalid code</div>'; return; }
      const dc = snap.docs[0].data();
      const now = new Date().toISOString().split("T")[0];
      if (dc.validTo && dc.validTo < now) { res.innerHTML = '<div style="background:#ffebee;border-radius:10px;padding:12px;color:#c62828;font-weight:700;">❌ Code expired</div>'; return; }
      if (dc.minOrder && amount < dc.minOrder) { res.innerHTML = '<div style="background:#fff3e0;border-radius:10px;padding:12px;color:#e65100;font-weight:700;">⚠️ Min order ₹' + dc.minOrder + ' required</div>'; return; }
      const saving = dc.type === "percent" ? (amount * dc.value / 100) : dc.value;
      const final = Math.max(0, amount - saving);
      res.innerHTML = '<div style="background:#e8f5e9;border-radius:10px;padding:12px;"><div style="color:#2e7d32;font-weight:800;">✅ Valid Code!</div><div style="font-size:13px;margin-top:6px;">You save: <strong style="color:var(--green);">₹' + saving.toFixed(0) + '</strong><br/>Final: <strong style="color:var(--p);">₹' + final.toFixed(0) + '</strong></div></div>';
    } catch(e) { res.innerHTML = '<div style="color:var(--red);font-size:13px;">' + e.message + '</div>'; }
  };
  loadDcCodes();
}

    const snap = await getDocs(query(collection(db,"discounts"), orderBy("createdAt","desc")));

async function renderInvoices(el) {
  if (!["admin","manager","staff"].includes(window.currentRole)) { el.innerHTML = '<div class="empty"><div class="em">🔒</div><p>Staff access required</p></div>'; return; }
  el.innerHTML = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;"><div class="card"><div class="card-header"><h3>🧾 Generate Invoice</h3></div><div class="card-body"><div class="form-group"><label>Type</label><select id="invType" onchange="loadInvItems()"><option value="order">🛒 Store Order</option><option value="booking">📅 Service Booking</option></select></div><div class="form-group"><label>Select Record</label><select id="invSelect"><option>Loading…</option></select></div><div class="form-group"><label>Business Name</label><input id="invBiz" value="joyfully.in"/></div><div class="form-group"><label>Address</label><input id="invAddr" value="Paltan Bazar, Guwahati, Assam"/></div><div class="form-group"><label>Notes</label><input id="invNotes" value="Thank you for shopping with us!"/></div><button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px;" onclick="genInvoice()">🧾 Generate Invoice</button></div></div><div id="invoicePreviewArea" style="display:flex;align-items:center;justify-content:center;background:#fff;border-radius:18px;border:1px solid var(--border);padding:20px;"><div style="text-align:center;color:var(--muted);"><div style="font-size:48px;">🧾</div><p style="margin-top:12px;">Select a record and click Generate</p></div></div></div>';
  window.loadInvItems = async function() {
    const type = document.getElementById("invType")?.value;
    const sel = document.getElementById("invSelect"); if(!sel)return;
    sel.innerHTML = "<option>Loading…</option>";
    try {
      const snap = await getDocs(query(collection(db, type==="order"?"orders":"bookings"), orderBy("createdAt","desc")));
      sel.innerHTML = snap.docs.map(d => { const data=d.data(); return '<option value="' + d.id + '">#' + d.id.substring(0,8).toUpperCase() + ' — ' + (data.customerName||"Guest") + ' — ' + (type==="order"?"₹"+(data.total||0).toLocaleString():data.service||"Service") + '</option>'; }).join("") || "<option>None found</option>";
    } catch(e) { sel.innerHTML = "<option>Error</option>"; }
  };
  window.genInvoice = async function() {
    const type = document.getElementById("invType").value;
    const id = document.getElementById("invSelect").value;
    if (!id || id.includes("Loading") || id.includes("None")) return toast("Please select a record","error");
    try {
      const snap = await getDocs(collection(db, type==="order"?"orders":"bookings"));
      const data = snap.docs.find(d=>d.id===id)?.data();
      if (!data) return toast("Could not load data","error");
      const invNum = "INV-" + Date.now().toString().slice(-6);
      const today = new Date().toLocaleDateString("en-IN");
      const biz = document.getElementById("invBiz").value;
      const addr = document.getElementById("invAddr").value;
      const notes = document.getElementById("invNotes").value;
      let itemsHtml = "", subtotal = 0;
      if (type === "order") {
        (data.items||[]).forEach(i => { const t=i.price*i.qty; subtotal+=t; itemsHtml+='<tr><td>' + (i.emoji||"📦") + " " + i.name + '</td><td style="text-align:center;">' + i.qty + '</td><td style="text-align:right;">₹' + i.price.toLocaleString() + '</td><td style="text-align:right;font-weight:700;">₹' + t.toLocaleString() + '</td></tr>'; });
        subtotal = data.subtotal || subtotal;
      } else {
        itemsHtml = '<tr><td>' + (data.service||"Service") + (data.package?" — "+data.package:"") + '</td><td style="text-align:center;">1</td><td style="text-align:right;">—</td><td style="text-align:right;font-weight:700;">—</td></tr>';
      }
      const delivery = data.delivery || 0; const total = data.total || subtotal + delivery;
      document.getElementById("invoicePreviewArea").innerHTML = '<div class="invoice-preview" id="invPrint"><div class="invoice-header"><div><div style="font-family:\'Baloo 2\',cursive;font-size:20px;font-weight:900;color:var(--p);">🐾 ' + biz + '</div><div style="font-size:12px;color:var(--muted);">' + addr + '</div></div><div style="text-align:right;"><div style="font-family:\'Baloo 2\',cursive;font-size:18px;font-weight:900;">INVOICE</div><div style="font-size:12px;color:var(--muted);">' + invNum + '</div><div style="font-size:12px;color:var(--muted);">Date: ' + today + '</div></div></div><div style="margin-bottom:16px;"><div style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;margin-bottom:5px;">Bill To</div><div style="font-weight:800;">' + (data.customerName||"Customer") + '</div><div style="font-size:12px;color:var(--muted);">' + (data.customerPhone||"") + '</div><div style="font-size:12px;color:var(--muted);">' + (data.address||data.customerEmail||"") + '</div></div><table class="invoice-table" style="width:100%;border-collapse:collapse;margin-bottom:16px;"><tr><th>Description</th><th style="text-align:center;">Qty</th><th style="text-align:right;">Rate</th><th style="text-align:right;">Amount</th></tr>' + itemsHtml + '</table><div style="display:flex;justify-content:flex-end;"><div style="min-width:240px;"><div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px;"><span>Subtotal</span><span>₹' + subtotal.toLocaleString() + '</span></div>' + (delivery ? '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px;"><span>Delivery</span><span>₹' + delivery + '</span></div>' : '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px;color:var(--green);"><span>Delivery</span><span>FREE 🚚</span></div>') + '<div style="display:flex;justify-content:space-between;padding:10px 0;font-size:16px;font-weight:900;border-top:2px solid var(--border);"><span>Total</span><span style="color:var(--p);">₹' + total.toLocaleString() + '</span></div></div></div>' + (notes ? '<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);">📝 ' + notes + '</div>' : '') + '<div style="margin-top:18px;text-align:center;font-size:11px;color:var(--muted);">Thank you for choosing joyfully.in 🐾</div></div><button class="btn btn-primary" style="margin-top:14px;width:100%;justify-content:center;" onclick="window.print()">🖨️ Print / Save as PDF</button>';
    } catch(e) { toast("Error: " + e.message, "error"); }
  };
  window.loadInvItems();
}
